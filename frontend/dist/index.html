<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molecule Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid full-width">
        <header class="bg-dark text-white py-3 mb-4">
            <div class="container">
                <h1 class="text-center mb-0">Molecule Manager</h1>
                <nav class="mt-3">
                    <ul class="nav justify-content-center">
                        <li class="nav-item">
                            <a href="#" class="nav-link text-light active" onclick="showSection('home')">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link text-light" onclick="showSection('search')">Search</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="container">
            <div id="form-message" class="alert d-none" role="alert"></div>
            
            <!-- Home Section -->
            <section id="home-section">
                <div class="card mb-4">
                    <div class="card-header">
                        <h3 class="mb-0">Add New Molecule</h3>
                    </div>
                    <div class="card-body">
                        <form id="molecule-form" class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Name *</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Enter molecule name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="smiles" class="form-label">SMILES *</label>
                                <input type="text" class="form-control" id="smiles" name="smiles" placeholder="Enter SMILES string" required>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">Add Molecule</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">Molecules List</h3>
                        <span class="badge bg-secondary" id="total-count">Loading...</span>
                    </div>
                    <div class="card-body">
                        <div id="molecules-list" class="row">
                        </div>
                        
                        <div id="pagination-controls" class="mt-4">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Search Section -->
            <section id="search-section" style="display: none;">
                <div class="card mb-4">
                    <div class="card-header">
                        <h3 class="mb-0">Substructure Search</h3>
                    </div>
                    <div class="card-body">
                        <form id="search-form" class="row g-3">
                            <div class="col-md-8">
                                <label for="search-query" class="form-label">Substructure SMILES</label>
                                <input type="text" class="form-control" id="search-query" name="query" placeholder="Enter substructure SMILES pattern" required>
                            </div>
                            <div class="col-md-3">
                                <label for="search-limit" class="form-label">Limit</label>
                                <select class="form-select" id="search-limit" name="limit">
                                    <option value="2" selected>2</option>
                                    <option value="5">5</option>
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                </select>
                            </div>
                            <div class="col-md-1">
                                <label class="form-label">&nbsp;</label>
                                <button type="submit" class="btn btn-success w-100">Search</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">Search Results</h3>
                        <span class="badge bg-secondary" id="search-total-count">0 found</span>
                    </div>
                    <div class="card-body">
                        <div id="search-results">
                        </div>
                        
                        <div id="search-pagination-controls" class="mt-4">
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Edit Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editModalLabel">Edit Molecule</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="edit-form">
                        <div class="modal-body">
                            <input type="hidden" id="edit-id" name="id">
                            <div class="mb-3">
                                <label for="edit-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="edit-name" name="name" placeholder="Enter molecule name">
                            </div>
                            <div class="mb-3">
                                <label for="edit-smiles" class="form-label">SMILES *</label>
                                <input type="text" class="form-control" id="edit-smiles" name="smiles" placeholder="Enter SMILES string" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Update Molecule</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
